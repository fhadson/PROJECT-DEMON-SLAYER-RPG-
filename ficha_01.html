<!DOCTYPE html>

<html lang="pt-br">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<link rel="icon" href="favicon.ico" type="image/x-icon">

	<title>Ficha do Personagem</title>

	<style>
		/* fundo e estilo principal */
		body {
			background-color: #1a1a1a;
			color: #ffffff;
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 20px;
			text-align: center;
			/* GIF como background */
			background-image: url("https://media1.tenor.com/m/HxDUBOf6rOsAAAAC/demon-slayer-movie.gif");
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}

		.panel {
			background: rgba(0, 0, 0, 0.6);
			display: inline-block;
			padding: 20px;
			border-radius: 8px;
			max-width: 1000px;
			width: 100%;
		}

		h1 {
			margin: 0 0 10px 0;
			font-size: 28px;
		}

		/* imagem opcional dentro do conteúdo */
		img.rengoku {
			max-width: 100%;
			height: auto;
			display: block;
			margin: 16px auto 0;
			border-radius: 6px;
		}
	</style>
	
</head>
<body>

    <!-- Criar tela de fundo com o GIF do Rengoku (feito via CSS). -->

    <div class="panel">
        <h1>Ficha do Personagem</h1>
        <p>Adicione aqui os detalhes da ficha do personagem.</p>
        <!-- Se quiser mostrar o GIF também como elemento, descomente a linha abaixo -->
        <!-- <img class="rengoku" src="https://media1.tenor.com/m/HxDUBOf6rOsAAAAC/demon-slayer-movie.gif" alt="Rengoku"> -->
    </div>

</body>
